services:
  - type: web
    name: myai-gateway
    runtime: node
    region: oregon
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ pnpm --filter @workspace/dashboard run build &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run push-force
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
